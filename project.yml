name: TestApp
options:
  bundleIdPrefix: com.soraycengiz
  deploymentTarget:
    iOS: "17.0"
targets:
  TestApp:
    type: application
    platform: iOS
    sources:
      - path: .
        excludes:
          - project.yml
          - README.md
          - "*.xcodeproj"
          - Info.plist
    info:
      path: Info.plist
      properties:
        CFBundleDisplayName: İyi Bütçe
        UILaunchScreen: {}
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        NSMicrophoneUsageDescription: Harcamalarını sesle girebilmen için mikrofon erişimi gerekiyor.
        NSSpeechRecognitionUsageDescription: Söylediklerini yazıya çevirebilmek için konuşma tanıma erişimi gerekiyor.
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.soraycengiz.TestApp
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "1"
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: TTD73R4725
        TARGETED_DEVICE_FAMILY: "1"
        SWIFT_VERSION: "5.0"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
